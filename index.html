<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة عشاء - ڨريوة وليد</title>
    
    <!-- الخطوط الفاخرة والرسمية -->
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Amiri:wght@400;700&family=El+Messiri:wght@400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* الألوان الرجولية الفخمة: ذهبي عتيق وكحلي داكن */
            --gold: #c5a059;
            --dark-gold: #8c733f;
            --bg-main: #0b1120; 
            --bg-card: #131c31; 
            --text-main: #f8fafc; 
            --text-muted: #cbd5e1; 
            --border-color: rgba(197, 160, 89, 0.25);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- واجهة الغلاف (الظرف التفاعلي الكحلي) --- */
        .envelope-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, #05080f, #131c31);
            background-image: radial-gradient(rgba(197, 160, 89, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: transform 1s ease-in-out 0.7s, opacity 1s ease-in-out 0.7s;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 200px;
            background: #1e293b; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            cursor: pointer;
            border-radius: 4px;
        }

        .envelope-wrapper::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            border-left: 160px solid #182233;
            border-right: 160px solid #182233;
            border-bottom: 110px solid #111827;
            border-top: 90px solid transparent;
            z-index: 2;
            border-radius: 0 0 4px 4px;
        }

        .flap {
            position: absolute;
            top: 0; left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #1f2c41;
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 3;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .seal {
            position: absolute;
            bottom: -30px; left: 50%;
            transform: translateX(-50%);
            width: 75px; height: 75px;
            background: radial-gradient(circle, var(--gold) 30%, var(--dark-gold) 100%);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111; 
            font-size: 2.2em;
            border: 2px solid #111;
            z-index: 4;
            font-family: 'Aref Ruqaa', serif;
        }

        .tap-text {
            margin-top: 50px;
            color: var(--text-muted);
            font-size: 1.2em;
            letter-spacing: 1px;
            animation: pulseText 2s infinite;
            font-family: 'El Messiri', sans-serif;
        }

        .envelope-container.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container.open .seal { opacity: 0; transition: opacity 0.2s; }
        .envelope-container.open { opacity: 0; transform: translateY(-100vh); pointer-events: none; }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; transform: scale(1.02); color: var(--gold); }
        }

        /* --- الحاوية الداخلية (تصميم داكن وهندسي) --- */
        .mobile-container {
            max-width: 430px;
            margin: 0 auto;
            background-color: var(--bg-card);
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
            padding-bottom: 60px;
        }

        /* إطار خطي كلاسيكي */
        .inner-border {
            position: absolute;
            top: 20px; bottom: 20px;
            left: 20px; right: 20px;
            border: 2px solid var(--gold);
            outline: 1px solid var(--border-color);
            outline-offset: 6px;
            pointer-events: none;
            z-index: 5;
        }

        .content-section {
            padding: 60px 35px;
            text-align: center;
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* نصوص وأيقونات */
        .basmala {
            font-family: 'Amiri', serif;
            font-size: 1.8em;
            color: var(--gold);
            margin-bottom: 25px;
            font-weight: 700;
        }

        h2.pre-title {
            font-family: 'El Messiri', sans-serif;
            color: var(--text-muted);
            font-size: 1.3em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        h1.names {
            font-family: 'Aref Ruqaa', serif;
            color: var(--text-main);
            font-size: 4.5em;
            margin: 0;
            line-height: 1.2;
            text-shadow: 2px 2px 0px rgba(197, 160, 89, 0.4); 
            font-weight: 700;
        }

        .date-subtitle {
            font-family: 'El Messiri', sans-serif;
            font-size: 1.5em;
            color: var(--gold);
            margin-top: 15px;
            font-weight: 600;
        }

        /* فاصل هندسي حاد */
        .sharp-divider {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 30px auto;
            position: relative;
        }
        .sharp-divider::after {
            content: '♦';
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            font-size: 18px;
            background: var(--bg-card);
            padding: 0 10px;
        }

        /* صندوق الدعوة */
        .quote {
            font-family: 'El Messiri', sans-serif;
            font-size: 1.5em;
            line-height: 2;
            color: var(--text-main);
            background: rgba(255,255,255,0.03); 
            padding: 30px 20px;
            border-radius: 8px;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            font-weight: 400;
        }

        /* الزر الداكن الرسمي (تم تعديل الهوامش ليتناسب مع الحذف) */
        .btn-outline {
            font-family: 'El Messiri', sans-serif;
            background: rgba(197, 160, 89, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            margin-top: 20px;
            text-decoration: none;
            display: block;
            padding: 18px;
            border-radius: 4px;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-outline:hover {
            background: var(--gold);
            color: #111;
        }

    </style>
</head>
<body>

    <!-- واجهة الظرف -->
    <div class="envelope-container" id="envelopeContainer" onclick="openEnvelope()">
        <div class="envelope-wrapper">
            <div class="flap">
                <div class="seal">W</div>
            </div>
        </div>
        <div class="tap-text"><i class="fa-solid fa-envelope-open-text"></i> اضغط لفتح الدعوة</div>
    </div>

    <!-- البطاقة الداخلية -->
    <div class="mobile-container">
        
        <!-- الإطار الهندسي الداخلي -->
        <div class="inner-border"></div>

        <!-- القسم الأول: الاسم -->
        <div class="content-section" style="padding-top: 90px;">
            <div class="reveal">
                
                <div class="basmala">بِسْمِ اللَّـهِ الرَّحْمَـٰنِ الرَّحِيمِ</div>
                
                <h2 class="pre-title">دعوة عشاء</h2>
                
                <h1 class="names">ڨريوة وليد</h1>
                <p class="date-subtitle">25 جويلية 2026</p>
                
                <!-- الفاصل الماسي الرسمي -->
                <div class="sharp-divider"></div>
            </div>
        </div>

        <!-- القسم الثاني: نص الدعوة الرسمي -->
        <div class="content-section" style="padding-top: 0;">
            <div class="reveal quote">
                نتشرف بدعوتكم لحضور مأدبة العشاء<br>
                المقامة بمناسبة الزفاف،<br>
                حضوركم شرف لنا وتكتمل به فرحتنا،<br>
                والعاقبة للأفراح والمسرات.
            </div>
        </div>

        <!-- القسم الثالث: الموقع فقط -->
        <div class="content-section" style="padding-bottom: 70px; padding-top: 0;">
            <div class="reveal" style="width: 100%;">
                <!-- زر الخرائط -->
                <a href="https://www.google.com/maps/search/?api=1&query=قاعة+الحفلات+المرجان+براقي" target="_blank" class="btn-outline">
                    <i class="fa-solid fa-location-dot"></i> موقع قاعة المرجان ببراقي
                </a>
            </div>
        </div>

    </div>

    <!-- الأكواد البرمجية (JavaScript) -->
    <script>
        function openEnvelope() {
            document.getElementById('envelopeContainer').classList.add('open');
            setTimeout(reveal, 1000); 
        }

        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 80;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
    </script>
</body>
</html>
